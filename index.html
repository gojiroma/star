<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決まり字ブックマーク</title>
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            position: relative;
        }

        .container {
            text-align: center;
            position: relative;
        }

        input {
            padding: 10px;
            width: 400px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        .message {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="text" id="bookmarkInput" placeholder="URLまたはキーワードを入力" autocomplete="off">
        <div class="suggestions" id="suggestions"></div>
        <p class="message" id="message"></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const input = document.getElementById('bookmarkInput');
            const suggestions = document.getElementById('suggestions');
            const message = document.getElementById('message');

            // パーセントデコード関数
            function decodePercentEncoding(str) {
                try {
                    return decodeURIComponent(str);
                } catch (e) {
                    return str;
                }
            }

            // 最新コミットのハッシュを取得
            async function fetchLatestCommitHash() {
                const apiUrl = 'https://api.github.com/repos/gojiroma/bookmarks/commits?path=urls.txt&per_page=1';
                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    if (data.length > 0) {
                        return data[0].sha;
                    } else {
                        throw new Error('コミットが見つかりません。');
                    }
                } catch (error) {
                    console.error('最新コミットの取得に失敗しました:', error);
                    return null;
                }
            }

            // 最新コミットのハッシュを使ってurls.txtをfetch
            async function fetchUrlsFromLatestCommit() {
                const commitHash = await fetchLatestCommitHash();
                if (!commitHash) {
                    console.error('コミットハッシュの取得に失敗しました。');
                    return [];
                }

                const fileUrl = `https://raw.githubusercontent.com/gojiroma/bookmarks/${commitHash}/urls.txt`;
                try {
                    const response = await fetch(fileUrl);
                    const text = await response.text();
                    return text.split('\n')
                        .filter(url => url.trim() !== '')
                        .map(url => decodePercentEncoding(url.trim()));
                } catch (error) {
                    console.error('URLリストの読み込みに失敗しました:', error);
                    return [];
                }
            }

            // ブックマークリストを初期化
            let defaultBookmarks = [];

            // 最新コミットからURLリストを読み込む
            defaultBookmarks = await fetchUrlsFromLatestCommit();

            // 重複を解消
            defaultBookmarks = [...new Set(defaultBookmarks)];

            if (defaultBookmarks.length > 0) {
                message.textContent = `${defaultBookmarks.length}件のブックマークを読み込みました。`;
            } else {
                message.textContent = 'URLリストの読み込みに失敗しました。';
            }

            // 入力内容を追加する
            const addBookmark = () => {
                const text = input.value.trim();
                if (!text) return;

                if (defaultBookmarks.includes(text)) {
                    message.textContent = 'このブックマークは既に存在します。';
                    return;
                }

                defaultBookmarks.push(text);
                input.value = '';
                message.textContent = 'ブックマークを追加しました。';
            };

            // 部分一致で検索し、1件だけに絞れたらそのURLに移動
            const searchAndNavigate = () => {
                const query = input.value.trim();
                if (!query) return;

                const matches = defaultBookmarks.filter(bookmark =>
                    bookmark.toLowerCase().includes(query.toLowerCase())
                );

                if (matches.length === 1) {
                    const url = matches[0].startsWith('http') ? matches[0] : `https://${matches[0]}`;
                    window.location.href = url;
                } else if (matches.length > 1) {
                    message.textContent = `${matches.length}件ヒットしました。`;
                } else {
                    // 該当なしの場合、GoogleのI'm Feeling Luckyに遷移
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=I'm+Feeling+Lucky`;
                }
            };

            // サジェスチョンを表示
            const showSuggestions = () => {
                const query = input.value.trim();
                if (!query) {
                    suggestions.style.display = 'none';
                    return;
                }

                const matches = defaultBookmarks.filter(bookmark =>
                    bookmark.toLowerCase().includes(query.toLowerCase())
                );

                if (matches.length > 0) {
                    suggestions.innerHTML = '';
                    matches.forEach(match => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = match;
                        div.addEventListener('click', () => {
                            input.value = match;
                            suggestions.style.display = 'none';
                        });
                        suggestions.appendChild(div);
                    });
                    suggestions.style.display = 'block';
                } else {
                    suggestions.style.display = 'none';
                }
            };

            // 入力が落ち着いたら自動で検索・遷移
            let typingTimer;
            const doneTypingInterval = 1000; // 1秒

            input.addEventListener('input', () => {
                showSuggestions();
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    const query = input.value.trim();
                    if (query) {
                        const matches = defaultBookmarks.filter(bookmark =>
                            bookmark.toLowerCase().includes(query.toLowerCase())
                        );

                        if (matches.length === 1) {
                            const url = matches[0].startsWith('http') ? matches[0] : `https://${matches[0]}`;
                            window.location.href = url;
                        } else if (matches.length === 0) {
                            window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=I'm+Feeling+Lucky`;
                        }
                    }
                }, doneTypingInterval);
            });

            // Enterキーを押したときの挙動
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    if (input.value.trim().length > 0) {
                        searchAndNavigate();
                    }
                }
            });

            // ページ外をクリックした際にサジェスチョンを非表示
            document.addEventListener('click', function (e) {
                if (e.target !== input) {
                    suggestions.style.display = 'none';
                }
            });

            // ページロード時にinputにフォーカス
            input.focus();
        });
    </script>
</body>
</html>
