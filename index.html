<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決まり字ブックマーク</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            position: relative;
            padding: 0 10px;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        input {
            padding: 10px;
            width: 400px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestion-item {
            padding: 8px 10px;
            cursor: pointer;
        }

        .suggestion-item:hover,
        .suggestion-item.selected {
            background-color: #f0f0f0;
        }

        .message {
            margin-top: 10px;
            color: #666;
        }

        .top-urls,
        .last-urls {
            position: fixed;
            width: 450px;
            height: 200px;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            z-index: 1000;
            box-sizing: border-box;
        }

        .top-urls {
            top: 10px;
            left: calc(50% - 500px);
        }

        .last-urls {
            top: 10px;
            right: calc(50% - 500px);
        }

        .url-item {
            padding: 5px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .url-item:hover {
            background-color: #f0f0f0;
        }

        .chart-container {
            margin: 20px auto;
            width: 100%;
            max-width: 600px;
            height: 300px;
        }

        @media (max-width: 768px) {

            .top-urls,
            .last-urls {
                position: relative;
                width: 100%;
                max-width: 400px;
                margin: 10px auto;
                top: auto;
                left: auto;
                right: auto;
            }

            .top-urls {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-urls" id="topUrls"></div>
        <div class="last-urls" id="lastUrls"></div>
        <p class="message" id="message"></p>
        <input type="text" id="bookmarkInput" placeholder="URLまたはキーワードを入力" autocomplete="off">
        <div class="suggestions" id="suggestions"></div>
        <div class="chart-container">
            <canvas id="redirectChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const input = document.getElementById('bookmarkInput');
            const suggestions = document.getElementById('suggestions');
            const message = document.getElementById('message');
            const topUrls = document.getElementById('topUrls');
            const lastUrls = document.getElementById('lastUrls');
            const ctx = document.getElementById('redirectChart').getContext('2d');

            // パーセントデコード関数
            function decodePercentEncoding(str) {
                try {
                    return decodeURIComponent(str);
                } catch (e) {
                    return str;
                }
            }

            // LocalStorageからブックマークを読み込む
            function loadBookmarksFromLocalStorage() {
                const storedBookmarks = localStorage.getItem('bookmarks');
                return storedBookmarks ? JSON.parse(storedBookmarks) : [];
            }

            // LocalStorageにブックマークを保存
            function saveBookmarksToLocalStorage(bookmarks) {
                localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            }

            // リダイレクト回数をLocalStorageから読み込む
            function loadRedirectCounts() {
                const storedCounts = localStorage.getItem('redirectCounts');
                if (!storedCounts) return {};
                try {
                    return JSON.parse(storedCounts);
                } catch (error) {
                    console.warn('redirectCounts の読み込みに失敗しました。破損したデータを初期化します。', error);
                    return {};
                }
            }

            // リダイレクト回数をLocalStorageに保存
            function saveRedirectCounts(counts) {
                localStorage.setItem('redirectCounts', JSON.stringify(counts));
            }

            // 最新コミットのハッシュを取得
            async function fetchLatestCommitHash() {
                const apiUrl = 'https://api.github.com/repos/gojiroma/bookmarks/commits?path=urls.txt&per_page=1';
                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    if (data.length > 0) {
                        return data[0].sha;
                    } else {
                        throw new Error('コミットが見つかりません。');
                    }
                } catch (error) {
                    console.error('最新コミットの取得に失敗しました:', error);
                    return null;
                }
            }

            // 最新コミットのハッシュを使ってurls.txtをfetch
            async function fetchUrlsFromLatestCommit() {
                const commitHash = await fetchLatestCommitHash();
                if (!commitHash) {
                    console.error('コミットハッシュの取得に失敗しました。');
                    return [];
                }

                const fileUrl = `https://raw.githubusercontent.com/gojiroma/bookmarks/${commitHash}/urls.txt`;
                try {
                    const response = await fetch(fileUrl);
                    const text = await response.text();
                    return text.split('\n')
                        .filter(url => url.trim() !== '')
                        .map(url => decodePercentEncoding(url.trim()));
                } catch (error) {
                    console.error('URLリストの読み込みに失敗しました:', error);
                    return [];
                }
            }

            // ブックマークリストを初期化
            let defaultBookmarks = loadBookmarksFromLocalStorage();

            // GitHubから最新のURLリストを取得して更新
            async function updateBookmarksFromGitHub() {
                const fetchedBookmarks = await fetchUrlsFromLatestCommit();
                if (fetchedBookmarks.length > 0) {
                    // 重複を解消して更新
                    defaultBookmarks = [...new Set([...fetchedBookmarks, ...defaultBookmarks])];
                    saveBookmarksToLocalStorage(defaultBookmarks);
                    message.textContent = `${defaultBookmarks.length}件のブックマークを更新しました。`;
                } else {
                    message.textContent = 'GitHubからの更新に失敗しました。';
                }
            }

            // リダイレクト回数を更新
            function updateRedirectCount(url) {
                const today = new Date().toISOString().split('T')[0];
                const counts = loadRedirectCounts();
                counts[today] = counts[today] || 0;
                counts[today]++;
                saveRedirectCounts(counts);
                try {
                    updateChart();
                } catch (error) {
                    console.warn('チャートの更新に失敗しました。', error);
                }
            }

            // チャートを更新
            function updateChart() {
                const counts = loadRedirectCounts();
                const labels = Object.keys(counts).sort();
                const data = labels.map(label => counts[label]);

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'リダイレクト回数',
                            data: data,
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            // トップURLを表示
            function updateTopUrls() {
                const counts = loadRedirectCounts();
                const allUrls = Object.values(counts).flatMap((_, index) => {
                    const date = Object.keys(counts)[index];
                    return JSON.parse(localStorage.getItem(`urls-${date}`) || '[]');
                });

                const urlCounts = {};
                allUrls.forEach(url => {
                    urlCounts[url] = (urlCounts[url] || 0) + 1;
                });

                const sortedUrls = Object.entries(urlCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 9)
                    .map(entry => entry[0]);

                topUrls.innerHTML = '';
                sortedUrls.forEach((url, index) => {
                    const div = document.createElement('div');
                    div.className = 'url-item';
                    div.textContent = `${index + 1}: ${url}`;
                    div.dataset.url = url;
                    div.addEventListener('click', () => {
                        window.location.href = normalizeUrl(url);
                    });
                    topUrls.appendChild(div);
                });
            }

            // 最後の10行を逆順で表示
            function updateLastUrls() {
                const lastTen = [...defaultBookmarks].slice(-10).reverse();
                lastUrls.innerHTML = '';
                lastTen.forEach((url, index) => {
                    const div = document.createElement('div');
                    div.className = 'url-item';
                    div.textContent = `${String.fromCharCode(97 + index)}: ${url}`;
                    div.dataset.url = url;
                    div.addEventListener('click', () => {
                        window.location.href = normalizeUrl(url);
                    });
                    lastUrls.appendChild(div);
                });
            }

            // ページロード時にGitHubから最新データを取得
            await updateBookmarksFromGitHub();
            updateChart();
            updateTopUrls();
            updateLastUrls();

            // 入力内容を追加する
            const addBookmark = () => {
                const text = input.value.trim();
                if (!text) return;

                if (defaultBookmarks.includes(text)) {
                    message.textContent = 'このブックマークは既に存在します。';
                    return;
                }

                defaultBookmarks.push(text);
                saveBookmarksToLocalStorage(defaultBookmarks);
                input.value = '';
                message.textContent = 'ブックマークを追加しました。';
                updateLastUrls();
            };

            function normalizeUrl(url) {
                return url.startsWith('http') ? url : `https://${url}`;
            }

            function navigateToLuckySearch(query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`;
            }

            // 部分一致で検索し、一番上の結果で遷移
            const searchAndNavigate = () => {
                const query = input.value.trim();
                if (!query) return;

                const today = new Date().toISOString().split('T')[0];
                const urlsToday = JSON.parse(localStorage.getItem(`urls-${today}`) || '[]');
                urlsToday.push(query);
                localStorage.setItem(`urls-${today}`, JSON.stringify(urlsToday));

                const matches = defaultBookmarks.filter(bookmark =>
                    bookmark.toLowerCase().includes(query.toLowerCase())
                );

                if (matches.length >= 1) {
                    const url = normalizeUrl(matches[0]);
                    try {
                        updateRedirectCount(url);
                    } catch (error) {
                        console.warn('リダイレクトカウント更新時にエラーが発生しました。', error);
                    }
                    window.location.href = url;
                } else {
                    try {
                        updateRedirectCount(query);
                    } catch (error) {
                        console.warn('リダイレクトカウント更新時にエラーが発生しました。', error);
                    }
                    navigateToLuckySearch(query);
                }
            };

            // サジェスチョンを表示
            const showSuggestions = () => {
                const query = input.value.trim();
                if (!query) {
                    suggestions.style.display = 'none';
                    return;
                }

                const matches = defaultBookmarks.filter(bookmark =>
                    bookmark.toLowerCase().includes(query.toLowerCase())
                );

                if (matches.length > 0) {
                    suggestions.innerHTML = '';
                    matches.forEach((match, index) => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = match;
                        div.dataset.index = index;
                        div.addEventListener('click', () => {
                            input.value = match;
                            suggestions.style.display = 'none';
                        });
                        suggestions.appendChild(div);
                    });
                    suggestions.style.display = 'block';
                } else {
                    suggestions.style.display = 'none';
                }
            };

            // 入力が落ち着いたら自動で検索・遷移
            let typingTimer;
            const doneTypingInterval = 500; // 500ms
            let selectedIndex = -1;
            let lastKeyTime = 0;
            let keyPressed = false;
            input.addEventListener('input', () => {
                showSuggestions();
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    const query = input.value.trim();
                    if (!query) return;

                    if (query.length === 1 && /^[1-9a-j]$/.test(query)) {
                        // 1文字でa~jまたは1~9の場合、トップURLまたは最後のURLから遷移
                        const topUrlsList = topUrls.querySelectorAll('.url-item');
                        const lastUrlsList = lastUrls.querySelectorAll('.url-item');
                        if (/^[1-9]$/.test(query)) {
                            const index = parseInt(query) - 1;
                            if (topUrlsList[index]) {
                                const url = normalizeUrl(topUrlsList[index].dataset.url);
                                window.location.href = url;
                            }
                        } else if (/^[a-j]$/.test(query)) {
                            const index = query.charCodeAt(0) - 97;
                            if (lastUrlsList[index]) {
                                const url = normalizeUrl(lastUrlsList[index].dataset.url);
                                window.location.href = url;
                            }
                        }
                    } else {
                        searchAndNavigate();
                    }
                }, doneTypingInterval);
            });
            // キーボード操作でサジェスチョンを選択
            input.addEventListener('keydown', function (e) {
                const suggestionItems = suggestions.querySelectorAll('.suggestion-item');
                if (suggestionItems.length > 0 && suggestions.style.display === 'block') {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        selectedIndex = (selectedIndex + 1) % suggestionItems.length;
                        suggestionItems.forEach((item, index) => {
                            if (index === selectedIndex) {
                                item.classList.add('selected');
                            } else {
                                item.classList.remove('selected');
                            }
                        });
                        lastKeyTime = Date.now();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        selectedIndex = (selectedIndex - 1 + suggestionItems.length) % suggestionItems.length;
                        suggestionItems.forEach((item, index) => {
                            if (index === selectedIndex) {
                                item.classList.add('selected');
                            } else {
                                item.classList.remove('selected');
                            }
                        });
                        lastKeyTime = Date.now();
                    }
                }
            });

            // キー操作が落ち着いたら選択中のサジェスチョンに遷移
            input.addEventListener('keyup', function (e) {
                const suggestionItems = suggestions.querySelectorAll('.suggestion-item');
                if (suggestionItems.length > 0 && suggestions.style.display === 'block' && selectedIndex >= 0) {
                    if (Date.now() - lastKeyTime > 300) {
                        const selectedUrl = suggestionItems[selectedIndex].textContent;
                        input.value = selectedUrl;
                        suggestions.style.display = 'none';
                        const url = selectedUrl.startsWith('http') ? selectedUrl : `https://${selectedUrl}`;
                        updateRedirectCount(url);
                        window.location.href = url;
                    }
                }
            });

            // ページ外をクリックした際にサジェスチョンを非表示
            document.addEventListener('click', function (e) {
                if (e.target !== input) {
                    suggestions.style.display = 'none';
                }
            });

            // ページロード時にinputにフォーカス
            input.focus();
        });
    </script>
</body>

</html>
